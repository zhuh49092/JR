<body>
    <div id="garden-container">
        <div id="garden-world">
            <div id="background-layer"></div>
            <div id="time-overlay"></div>
            <div id="plants-layer"></div>
        </div>
    </div>

    <button id="plant-btn" title="种植"></button>

    <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-out">-</button>
        <button class="zoom-btn" id="zoom-reset">⟲</button>
    </div>

    <div id="time-display">
        <span id="current-time"></span>
        <span id="time-period"></span>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <span id="modal-close">&times;</span>
            <h3 class="modal-title">投稿详情</h3>
            <div id="modal-plant-info"></div>
            <div class="comment-list" id="comment-list"></div>
            <textarea id="comment-input" placeholder="写下你的评论..."></textarea>
            <button id="submit-comment">发表评论</button>
        </div>
    </div>
